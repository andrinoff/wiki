name: Fast-Forward Merge

on:
  issue_comment:
    types: [created]

jobs:
  merge:
    if: ${{ github.event.issue.pull_request && github.event.comment.body == '/m' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.get_token.outputs.token }}
          fetch-depth: 0

      - name: Fetch Target Branch
        id: pr
        env:
          GH_TOKEN: ${{ steps.get_token.outputs.token }}
        run: |
          # We only need the base branch name (e.g., main) to know where to push
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --json baseRefName)
          echo "base=$(echo "$PR_DATA" | jq -r .baseRefName)" >> $GITHUB_OUTPUT

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge
        run: |
          # 1. Fetch the exact PR commit into a temporary local branch named 'pr-branch'
          git fetch origin pull/${{ github.event.issue.number }}/head:pr-branch

          # 2. Checkout the target base branch (e.g., main)
          git checkout ${{ steps.pr.outputs.base }}

          # 3. Perform the fast-forward merge from the temporary branch
          git merge --ff-only pr-branch

          # 4. Push to the protected branch using the App token
          git push origin ${{ steps.pr.outputs.base }}
